name: Backend CI / Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [20, 22]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          PORT: 0
          CORS_ORIGIN: http://localhost
          JWT_SECRET: ci-secret-ci-secret-ci-secret-ci-secret
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: testpassword123
          FIREBASE_PROJECT_ID: ci-project
          FIREBASE_CLIENT_EMAIL: ci@ci.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: '-----BEGIN PRIVATE KEY-----\nfake\n-----END PRIVATE KEY-----\n'
          FIREBASE_DATABASE_URL: https://ci.firebaseio.com
          ANALYTICS_SINK: csv
          ANALYTICS_CSV_PATH: /tmp/ci_events.csv

  deploy:
    name: Deploy to Render
    needs: test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not configured."
            exit 1
          fi

          curl -X POST "$RENDER_DEPLOY_HOOK"

          echo "Render deployment triggered successfully."
