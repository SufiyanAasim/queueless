name: Frontend CI

# ----------------------------------------------------------------------------
# Owner: Sufiyan (CI/CD & Testing module).
#
# Why this is a CI-only workflow (no deploy job)
# ----------------------------------------------
# Vercel's GitHub integration handles deployment automatically: every push to
# main triggers a production deploy, every PR creates a preview URL. We do
# NOT want to deploy from GitHub Actions in parallel - that would cause
# duplicate deploys and inconsistent environments.
#
# What this workflow DOES do is run a build on every PR so a broken commit
# never reaches main and never gets a Vercel preview URL plastered on a
# pull request.
# ----------------------------------------------------------------------------

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          # Build needs env vars to exist. Real values are injected by Vercel
          # at deploy time; here we just need the build to succeed.
          VITE_API_BASE_URL: https://placeholder.example.com/api/v1
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_MEASUREMENT_ID: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: placeholder
          VITE_FIREBASE_DATABASE_URL: https://placeholder.firebaseio.com
          VITE_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '0'
          VITE_FIREBASE_APP_ID: '0'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: matrix.node == '20'
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
