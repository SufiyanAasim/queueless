name: ❓ Question
description: Ask a question about setup, usage, or behaviour
title: "question: <short description>"
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check [RUNNING.md](../../RUNNING.md), the [docs/](../../docs) folder,
        and [docs/Troubleshooting.md](../../docs/Troubleshooting.md).
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What have you tried so far?
