name: 📚 Documentation
description: Report missing, unclear, or incorrect documentation
title: "docs: <short description>"
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Which document?
      placeholder: docs/Deployment.md, README.md § Quick Start, …
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
